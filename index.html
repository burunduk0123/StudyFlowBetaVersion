<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StudyFlow Beta+</title>

<style>
body{font-family:Arial;margin:0;background:#f0f2f5;}
header{background:#5bc0de;padding:20px;text-align:center;color:white;font-size:30px;}
.container{display:flex;gap:20px;padding:20px;}
.left{width:250px;}
.right{flex:1;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
.task{background:#eee;padding:10px;margin:10px 0;border-radius:8px;cursor:pointer;}
.selected{border:2px solid blue;}
.done{text-decoration:line-through;opacity:0.6;}
.progress{background:#ddd;border-radius:10px;}
.bar{height:20px;background:green;width:0%;}
</style>
</head>

<body>

<header>StudyFlow</header>

<div class="container">

<div class="left">

<div class="card">
<h3>Add Task</h3>
<input id="subject" placeholder="Subject"><br><br>
<input id="desc" placeholder="Task"><br><br>
<input id="date" type="date"><br><br>
<button onclick="addTask()">Add</button>
</div>

<div class="card">
<h3>Actions</h3>
<button onclick="completeTask()">Complete</button><br><br>
<button onclick="clearAll()">Clear All</button><br><br>
<input type="file" id="fileInput">
<button onclick="attachFile()">Attach File</button>
</div>

<div class="card">
<h3>Settings</h3>
<select id="range" onchange="render()">
<option value="7">1 week</option>
<option value="14">2 weeks</option>
<option value="21">3 weeks</option>
<option value="30">1 month</option>
</select>
</div>

</div>

<div class="right">

<div class="card">
<h3>Tasks</h3>
<div id="taskList"></div>
</div>

<div class="card">
<h3>Calendar</h3>
<div id="calendar"></div>
</div>

<div class="card">
<h3>Progress</h3>
<div class="progress"><div id="bar" class="bar"></div></div>
<p id="percent">0%</p>
</div>

</div>

</div>

<script>

let tasks=[]
let selected=null

function addTask(){
let t={
subject:subject.value,
desc:desc.value,
date:date.value,
done:false,
file:null
}
tasks.push(t)
render()
}

function clearAll(){
tasks=[]
render()
}

function attachFile(){
if(selected==null) return
let file=document.getElementById("fileInput").files[0]
tasks[selected].file=file?file.name:null
render()
}

function completeTask(){
if(selected==null) return
tasks[selected].done=true
render()
}

function render(){

let range=parseInt(document.getElementById("range").value)
let now=new Date()

// фильтр по диапазону
let filtered=tasks.filter(t=>{
let d=new Date(t.date)
let diff=(d-now)/(1000*60*60*24)
return diff<=range
})

// сортировка по дате
filtered.sort((a,b)=> new Date(a.date)-new Date(b.date))

// задачи
taskList.innerHTML=""
filtered.forEach((t,i)=>{
let div=document.createElement("div")
div.className="task"

if(t.done) div.classList.add("done")
if(tasks.indexOf(t)===selected) div.classList.add("selected")

div.innerHTML=`
<b>${t.subject}</b><br>
${t.desc}<br>
${t.date}<br>
${t.file? "📎 "+t.file:""}
`

div.onclick=()=>{selected=tasks.indexOf(t);render()}
taskList.appendChild(div)
})

// прогресс
let done=filtered.filter(t=>t.done).length
let percent=filtered.length?Math.round(done/filtered.length*100):0
bar.style.width=percent+"%"
percentText=percent+"%"
document.getElementById("percent").innerText=percent+"%"

// календарь (простой)
calendar.innerHTML=""
filtered.forEach(t=>{
let div=document.createElement("div")
div.innerText=t.date+" - "+t.subject
calendar.appendChild(div)
})

}

</script>

</body>
</html>
